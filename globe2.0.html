<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Globe</title>
  <link rel="stylesheet" href="./leaflet.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #000005 100%);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* CSS starfield — no image needed */
    body::before, body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  55%, rgba(255,255,255,0.5) 0%, transparent 100%);
    }
    body::after {
      background-image:
        radial-gradient(1px 1px at 15% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 65%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 95%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 45%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 5%,  rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 8%  85%, rgba(255,255,255,0.6) 0%, transparent 100%);
    }

    #globe-container {
      width: 100vw;
      height: 100vh;
    }

    /* ── Search bar ── */
    #search-panel {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: min(480px, 90vw);
    }
    #search-row { display: flex; gap: 8px; }
    #search-tabs {
      display: flex;
      gap: 6px;
    }
    .search-tab {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15,15,30,0.8);
      backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-tab.active { background: rgba(30,80,180,0.7); border-color: #4af; color: #fff; }

    /* ── Business results list ── */
    #biz-results {
      position: fixed;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: min(480px, 90vw);
      background: rgba(10,15,35,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(80,160,255,0.3);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }
    .biz-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
      transition: background 0.15s;
    }
    .biz-item:hover { background: rgba(30,80,180,0.4); }
    .biz-item:last-child { border-bottom: none; }
    .biz-item-name { font-size: 13px; color: #fff; font-weight: 600; }
    .biz-item-addr { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    #search-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(15,15,30,0.85);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: #4af; }
    #search-input::placeholder { color: rgba(255,255,255,0.4); }

    #search-btn {
      padding: 10px 20px;
      border-radius: 24px;
      border: none;
      background: #1a6fcc;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #search-btn:hover { background: #2288ff; }

    /* ── Search result card ── */
    #result-card {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: min(480px, 90vw);
      background: rgba(10,15,35,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(80,160,255,0.3);
      border-radius: 12px;
      padding: 14px 18px;
      display: none;
    }
    #result-card h3  { font-size: 15px; color: #4af; margin-bottom: 4px; }
    #result-info     { font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.7; }

    /* ── 2D Map panel ── */
    #map-panel {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
      width: 360px;
      max-width: calc(100vw - 48px);
      background: rgba(10,15,35,0.95);
      border: 1px solid rgba(80,160,255,0.35);
      border-radius: 14px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #map-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      font-size: 13px;
      color: #4af;
      border-bottom: 1px solid rgba(80,160,255,0.2);
    }
    #map-panel-title { font-weight: 600; }
    #map-close-btn {
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      font-size: 16px;
      line-height: 1;
      border: none;
      background: none;
      color: rgba(255,255,255,0.5);
      padding: 0 4px;
    }
    #map-close-btn:hover { color: #fff; }
    #map-frame {
      width: 100%;
      height: 240px;
    }
    #map-tabs {
      display: flex;
      border-bottom: 1px solid rgba(80,160,255,0.2);
    }
    .map-tab {
      flex: 1;
      padding: 7px;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      background: none;
      border: none;
      transition: all 0.15s;
    }
    .map-tab.active { color: #4af; border-bottom: 2px solid #4af; }
    .map-tab:hover  { color: #fff; }

    /* ── Directions panel ── */
    #directions-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: min(340px, 90vw);
      background: rgba(10,15,35,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(80,160,255,0.3);
      border-radius: 14px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      max-height: calc(100vh - 40px);
    }
    #directions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(80,160,255,0.2);
    }
    #directions-header span { font-size: 14px; color: #4af; font-weight: 600; }
    #directions-close {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 16px; cursor: pointer;
    }
    #directions-close:hover { color: #fff; }
    #directions-inputs {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid rgba(80,160,255,0.15);
    }
    .dir-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dir-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .dir-dot.start { background: #22cc66; }
    .dir-dot.end   { background: #e63946; }
    .dir-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .dir-input:focus { border-color: #4af; }
    .dir-input::placeholder { color: rgba(255,255,255,0.35); }
    #get-directions-btn {
      margin: 0 16px 12px;
      padding: 9px;
      border-radius: 20px;
      border: none;
      background: #1a6fcc;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    #get-directions-btn:hover { background: #2288ff; }
    #directions-summary {
      padding: 10px 16px;
      background: rgba(30,80,180,0.25);
      font-size: 13px;
      color: #fff;
      display: none;
      border-bottom: 1px solid rgba(80,160,255,0.15);
    }
    #directions-summary strong { color: #4af; }
    #directions-steps {
      overflow-y: auto;
      flex: 1;
    }
    .dir-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      line-height: 1.4;
    }
    .dir-step:last-child { border-bottom: none; }
    .dir-step-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .dir-step-dist { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    /* ── Layer toggles ── */
    #controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toggle-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15,15,30,0.8);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .toggle-btn.active  { background: rgba(30,80,180,0.7); border-color: #4af; }
    .toggle-btn:hover   { border-color: rgba(255,255,255,0.5); }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Info bar ── */
    #info {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
      display: none;
    }

    /* ── Pin labels ── */
    .pin-label {
      background: rgba(10,15,40,0.9);
      border: 1px solid #4af;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #fff;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(68,170,255,0.4);
    }
    .pin-label strong { color: #4af; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading globe data…</span>
</div>

<div id="globe-container"></div>

<!-- Search -->
<div id="search-panel">
  <div id="search-tabs">
    <button class="search-tab active" id="tab-address">📍 Address</button>
    <button class="search-tab" id="tab-business">🏪 Business</button>
  </div>
  <div id="search-row">
    <input id="search-input" type="text" placeholder="Enter an address, city, or landmark…" />
    <button id="search-btn">Search</button>
  </div>
</div>

<div id="biz-results"></div>

<div id="result-card">
  <h3 id="result-name"></h3>
  <div id="result-info"></div>
</div>

<!-- 2D Map Panel -->
<div id="map-panel">
  <div id="map-panel-header">
    <span id="map-panel-title">📍 Map View</span>
    <button id="map-close-btn">✕</button>
  </div>
  <div id="map-tabs">
    <button class="map-tab active" data-layer="mapnik">Street</button>
    <button class="map-tab" data-layer="hot">Humanitarian</button>
    <button class="map-tab" data-layer="cyclemap">Cycle</button>
  </div>
  <div id="map-frame"></div>
</div>

<!-- Directions Panel -->
<div id="directions-panel">
  <div id="directions-header">
    <span>🚗 Directions</span>
    <button id="directions-close">✕</button>
  </div>
  <div id="directions-inputs">
    <div class="dir-input-row">
      <div class="dir-dot start"></div>
      <input class="dir-input" id="dir-start" type="text" placeholder="Starting point…" />
    </div>
    <div class="dir-input-row">
      <div class="dir-dot end"></div>
      <input class="dir-input" id="dir-end" type="text" placeholder="Destination…" />
    </div>
  </div>
  <button id="get-directions-btn">Get Directions</button>
  <div id="directions-summary"></div>
  <div id="directions-steps"></div>
</div>

<!-- Layer controls -->
<div id="controls">
  <button class="toggle-btn" id="btn-directions">🚗 Directions</button>
  <button class="toggle-btn active" id="btn-borders">🌐 Country Borders</button>
  <button class="toggle-btn active" id="btn-heatmap">🔥 Heatmap</button>
  <button class="toggle-btn active" id="btn-markers">📍 City Markers</button>
</div>

<div id="info">
  Globe.gl · OpenStreetMap Nominatim<br>
  Drag to rotate · Scroll to zoom
</div>

<!-- Globe.gl -->
<script src="./globe.gl.min.js"></script>
<script src="./leaflet.min.js"></script>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const GEOJSON_URL = 'https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson';

// Major world cities for markers + heatmap seed
const CITIES = [
  { name:'New York',     lat:40.71,  lng:-74.01, pop:8.3  },
  { name:'Los Angeles',  lat:34.05,  lng:-118.24,pop:4.0  },
  { name:'Chicago',      lat:41.88,  lng:-87.63, pop:2.7  },
  { name:'London',       lat:51.51,  lng:-0.13,  pop:9.0  },
  { name:'Paris',        lat:48.86,  lng:2.35,   pop:2.2  },
  { name:'Berlin',       lat:52.52,  lng:13.41,  pop:3.7  },
  { name:'Tokyo',        lat:35.69,  lng:139.69, pop:13.9 },
  { name:'Beijing',      lat:39.91,  lng:116.39, pop:21.5 },
  { name:'Shanghai',     lat:31.23,  lng:121.47, pop:24.1 },
  { name:'Mumbai',       lat:19.08,  lng:72.88,  pop:20.7 },
  { name:'Delhi',        lat:28.61,  lng:77.21,  pop:32.9 },
  { name:'São Paulo',    lat:-23.55, lng:-46.63, pop:22.0 },
  { name:'Mexico City',  lat:19.43,  lng:-99.13, pop:21.6 },
  { name:'Cairo',        lat:30.04,  lng:31.24,  pop:20.9 },
  { name:'Lagos',        lat:6.52,   lng:3.38,   pop:15.0 },
  { name:'Nairobi',      lat:-1.29,  lng:36.82,  pop:4.4  },
  { name:'Sydney',       lat:-33.87, lng:151.21, pop:5.3  },
  { name:'Moscow',       lat:55.75,  lng:37.62,  pop:12.5 },
  { name:'Istanbul',     lat:41.01,  lng:28.95,  pop:15.5 },
  { name:'Dubai',        lat:25.20,  lng:55.27,  pop:3.5  },
  { name:'Singapore',    lat:1.35,   lng:103.82, pop:5.9  },
  { name:'Seoul',        lat:37.57,  lng:126.98, pop:9.8  },
  { name:'Jakarta',      lat:-6.21,  lng:106.85, pop:10.6 },
  { name:'Buenos Aires', lat:-34.60, lng:-58.38, pop:15.4 },
  { name:'Karachi',      lat:24.86,  lng:67.01,  pop:16.1 },
  { name:'Dhaka',        lat:23.81,  lng:90.41,  pop:22.5 },
  { name:'Kinshasa',     lat:-4.32,  lng:15.32,  pop:17.1 },
  { name:'Johannesburg', lat:-26.20, lng:28.04,  pop:5.6  },
  { name:'Toronto',      lat:43.65,  lng:-79.38, pop:6.2  },
  { name:'Madrid',       lat:40.42,  lng:-3.70,  pop:3.3  },
];

// ─── Globe init ───────────────────────────────────────────────────────────────
const globe = Globe()(document.getElementById('globe-container'))
  .globeImageUrl('')
  .backgroundColor('rgba(0,0,0,0)')
  .showAtmosphere(true)
  .atmosphereColor('#2255cc')
  .atmosphereAltitude(0.22)
  .width(window.innerWidth)
  .height(window.innerHeight);

// resize
window.addEventListener('resize', () => {
  globe.width(window.innerWidth).height(window.innerHeight);
});

// Style the ocean (globe surface) via Three.js material
globe.onGlobeReady(() => {
  const globeMesh = globe.scene().children.find(c => c.type === 'Mesh' && c.geometry?.type?.includes('Sphere'));
  if (globeMesh) globeMesh.material.color.set('#071a40');
});

// ─── State ────────────────────────────────────────────────────────────────────
let showBorders  = true;
let showHeatmap  = true;
let showMarkers  = true;
let searchPin    = null;   // {lat, lng, name, info} or null

// ─── Country colour helper ────────────────────────────────────────────────────
const countryColors = [
  'rgba(30,80,200,0.55)',  'rgba(20,160,100,0.55)',
  'rgba(180,40,80,0.55)', 'rgba(160,120,10,0.55)',
  'rgba(100,30,180,0.55)','rgba(20,140,180,0.55)',
];
function countryColor(feat) {
  const h = feat.properties.name
    ? feat.properties.name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)
    : 0;
  return countryColors[h % countryColors.length];
}

// ─── Show globe immediately, load borders in background ───────────────────────
applyHeatmap();
applyMarkers();

// Dismiss loading as soon as the globe texture is ready
globe.onGlobeReady(() => {
  document.getElementById('loading').style.display = 'none';
});

// Borders stream in after the globe is visible
fetch(GEOJSON_URL)
  .then(r => r.json())
  .then(world => {
    _borderFeatures = world.features;
    if (showBorders) applyBorders(_borderFeatures);
  })
  .catch(() => {/* no borders — globe still works */});

// ─── Layer: Country Borders ───────────────────────────────────────────────────
function applyBorders(features) {
  if (!showBorders) { globe.polygonsData([]); return; }
  globe
    .polygonsData(features)
    .polygonAltitude(0.008)
    .polygonCapColor(f => showBorders ? countryColor(f) : 'rgba(0,0,0,0)')
    .polygonSideColor(() => 'rgba(255,255,255,0.04)')
    .polygonStrokeColor(() => 'rgba(255,255,255,0.25)')
    .polygonLabel(f =>
      `<div style="background:rgba(0,0,20,.85);padding:6px 10px;border-radius:8px;
       border:1px solid rgba(80,160,255,.4);font-size:13px;color:#fff">
         <b>${f.properties.name || 'Unknown'}</b>
       </div>`
    );
}

let _borderFeatures = [];

// ─── Layer: Heatmap ───────────────────────────────────────────────────────────
// Build a dense heatmap by spreading random points around each city weighted by pop
function buildHeatPoints() {
  const pts = [];
  CITIES.forEach(c => {
    const count = Math.round(c.pop * 12);
    for (let i = 0; i < count; i++) {
      pts.push({
        lat: c.lat + (Math.random() - 0.5) * 3.5,
        lng: c.lng + (Math.random() - 0.5) * 3.5,
        weight: c.pop,
      });
    }
  });
  return pts;
}

function applyHeatmap() {
  if (!showHeatmap) { globe.heatmapsData([]); return; }
  const pts = buildHeatPoints();
  globe
    .heatmapsData([{ heatmapPoints: pts.map(p => [p.lat, p.lng, p.weight]) }])
    .heatmapPointLat(d => d[0])
    .heatmapPointLng(d => d[1])
    .heatmapPointWeight(d => d[2])
    .heatmapBandwidth(3.5)
    .heatmapColorFn(t => {
      // black → blue → cyan → yellow → red
      if (t < 0.25) return `rgba(0,50,${Math.round(t*4*255)},${t*4*0.9})`;
      if (t < 0.5)  return `rgba(0,${Math.round((t-0.25)*4*200)},255,0.85)`;
      if (t < 0.75) return `rgba(${Math.round((t-0.5)*4*255)},255,255,0.9)`;
      return `rgba(255,${Math.round((1-t)*4*200)},0,0.95)`;
    })
    .heatmapBaseAltitude(0.002)
    .heatmapTopAltitude(0.06);
}

// ─── Layer: City Markers ──────────────────────────────────────────────────────
function buildMarkersData() {
  const data = [...CITIES];
  if (searchPin) data.push({ ...searchPin, isPin: true });
  return data;
}

function applyMarkers() {
  if (!showMarkers && !searchPin) { globe.htmlElementsData([]); return; }

  const data = buildMarkersData();

  globe
    .htmlElementsData(data)
    .htmlLat(d => d.lat)
    .htmlLng(d => d.lng)
    .htmlAltitude(d => d.isPin ? 0.08 : 0.02)
    .htmlElement(d => {
      const el = document.createElement('div');
      el.className = 'pin-label';
      if (d.isPin) {
        el.innerHTML = `<strong>📍 ${d.name}</strong>`;
        el.style.fontSize = '13px';
        el.style.borderColor = '#ff4';
        el.style.boxShadow = '0 0 16px rgba(255,220,0,0.6)';
      } else if (showMarkers) {
        el.innerHTML = `<strong>${d.name}</strong>`;
      } else {
        return null;
      }
      return el;
    });
}

// ─── Search ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchBtn   = document.getElementById('search-btn');
const resultCard  = document.getElementById('result-card');
const resultName  = document.getElementById('result-name');
const resultInfo  = document.getElementById('result-info');

// Detect if input is coordinates like "40.7128, -74.0060"
function parseCoords(q) {
  const m = q.match(/^\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*$/);
  if (!m) return null;
  const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
  return { lat, lng };
}

// Reverse geocode coordinates → address
async function reverseGeocode(lat, lng) {
  // ArcGIS reverse geocoder — accurate US house numbers, no API key needed
  try {
    const arcgisUrl = `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/reverseGeocode?location=${lng},${lat}&f=json&distance=50&langCode=EN`;
    const res  = await fetch(arcgisUrl);
    const data = await res.json();
    if (data.address && data.address.Match_addr) {
      const a = data.address;
      return {
        lat, lng,
        display: a.Match_addr,
        source:  'arcgis',
        addr: {
          house_number: a.AddNum,
          road:         a.StName + (a.StType ? ' ' + a.StType : ''),
          city:         a.City,
          state:        a.RegionAbbr || a.Region,
          postcode:     a.Postal,
          country:      a.CntryName,
        }
      };
    }
  } catch(_) {}

  // Fallback: Nominatim reverse
  const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1&zoom=18`;
  const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const place = await res.json();
  if (place.error) return { lat, lng, display: `${lat}, ${lng}`, source: 'coords', addr: {} };
  return {
    lat, lng,
    display: place.display_name,
    source:  'reverse',
    addr:    place.address || {},
  };
}

// Try US Census geocoder first (most accurate for US addresses), fall back to Nominatim
async function geocode(q) {
  // US Census Bureau geocoder
  try {
    const censusUrl = `https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address=${encodeURIComponent(q)}&benchmark=2020&format=json`;
    const res  = await fetch(censusUrl);
    const data = await res.json();
    const matches = data?.result?.addressMatches;
    if (matches && matches.length > 0) {
      const m = matches[0];
      return {
        lat:     m.coordinates.y,
        lng:     m.coordinates.x,
        display: m.matchedAddress,
        source:  'census',
        addr: {
          house_number: m.addressComponents.fromAddress,
          road:         m.addressComponents.streetName,
          city:         m.addressComponents.city,
          state:        m.addressComponents.state,
          postcode:     m.addressComponents.zip,
          country:      'United States',
        }
      };
    }
  } catch(_) {}

  // Fallback: Nominatim
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=1`;
  const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const data = await res.json();
  if (!data.length) return null;
  const place = data[0];
  return {
    lat:     parseFloat(place.lat),
    lng:     parseFloat(place.lon),
    display: place.display_name,
    source:  'nominatim',
    addr:    place.address || {},
  };
}

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;

  searchBtn.textContent = '…';
  searchBtn.disabled = true;

  try {
    const coords = parseCoords(q);
    const result = coords ? await reverseGeocode(coords.lat, coords.lng) : await geocode(q);

    if (!result) {
      resultName.textContent = 'No results found';
      resultInfo.textContent = `Could not find "${q}" — try a full address like "123 Main St, Chicago" or just a city name.`;
      resultCard.style.display = 'block';
      return;
    }

    const lat  = result.lat;
    const lng  = result.lng;
    const addr = result.addr;

    // Build a clean display name
    const shortName = result.display.split(',').slice(0, 2).join(',').trim();

    // Build structured address lines
    const street  = [addr.house_number, addr.road].filter(Boolean).join(' ');
    const city    = addr.city || addr.town || addr.village || addr.county || '';
    const state   = addr.state || '';
    const zip     = addr.postcode || '';
    const country = addr.country || '';

    const addrLines = [street, city, [state, zip].filter(Boolean).join(' '), country]
      .filter(Boolean)
      .map(l => `<div>${l}</div>`)
      .join('');

    const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;

    resultName.textContent = shortName;
    resultInfo.innerHTML = `
      <div style="margin-bottom:6px;line-height:1.7">${addrLines}</div>
      <div style="color:rgba(255,255,255,0.45);font-size:11px">
        ${lat.toFixed(5)}, ${lng.toFixed(5)}
      </div>
      <a href="${mapsUrl}" target="_blank"
         style="display:inline-block;margin-top:8px;padding:4px 12px;
                border-radius:12px;background:#1a6fcc;color:#fff;
                font-size:12px;text-decoration:none">
        Open in Google Maps ↗
      </a>`;
    resultCard.style.display = 'block';

    // Drop a pin + fly in close
    searchPin = { lat, lng, name: shortName };
    applyMarkers();

    // zoom level: street address → very close, city → medium
    const isStreetLevel = !!(addr.house_number || addr.road);
    const mapZoom = isStreetLevel ? 17 : 13;
    globe.pointOfView({ lat, lng, altitude: isStreetLevel ? 0.15 : 0.6 }, 1800);

    // Show 2D map panel
    showMap(lat, lng, shortName, mapZoom);

  } catch (err) {
    resultName.textContent = 'Search error';
    resultInfo.textContent = 'Could not reach geocoding service. Check your connection.';
    resultCard.style.display = 'block';
  } finally {
    searchBtn.textContent = 'Search';
    searchBtn.disabled = false;
  }
}

let searchMode = 'address';
const bizResults = document.getElementById('biz-results');

document.getElementById('tab-address').addEventListener('click', function() {
  searchMode = 'address';
  this.classList.add('active');
  document.getElementById('tab-business').classList.remove('active');

  bizResults.style.display = 'none';
});

document.getElementById('tab-business').addEventListener('click', function() {

});

// Business search via Nominatim (supports POI/amenity search)
async function searchBusiness(q) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=8&addressdetails=1&extratags=1`;
  const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  return await res.json();
}

function selectBizResult(lat, lng, name) {
  bizResults.style.display = 'none';
  searchPin = { lat, lng, name };
  applyMarkers();
  const isStreetLevel = true;
  globe.pointOfView({ lat, lng, altitude: 0.3 }, 1800);
  showMap(lat, lng, name, 17);
  resultName.textContent = name;
  resultInfo.innerHTML = `<div style="color:rgba(255,255,255,0.45);font-size:11px">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`;
  resultCard.style.display = 'block';
}

searchBtn.addEventListener('click', () => {
  if (searchMode === 'business') doBizSearch();
  else doSearch();
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (searchMode === 'business') doBizSearch();
    else doSearch();
  }
});

async function doBizSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  searchBtn.textContent = '…';
  searchBtn.disabled = true;
  bizResults.style.display = 'none';

  try {
    const data = await searchBusiness(q);
    if (!data.length) {
      bizResults.innerHTML = `<div class="biz-item"><div class="biz-item-name">No results found</div><div class="biz-item-addr">Try adding a city name, e.g. "Starbucks Atlanta"</div></div>`;
      bizResults.style.display = 'block';
      return;
    }
    bizResults.innerHTML = data.map((place, i) => {
      const name = place.display_name.split(',').slice(0,2).join(',').trim();
      const addr = place.display_name.split(',').slice(2,5).join(',').trim();
      return `<div class="biz-item" data-i="${i}">
        <div class="biz-item-name">${name}</div>
        <div class="biz-item-addr">${addr}</div>
      </div>`;
    }).join('');
    bizResults.style.display = 'block';

    // Click a result
    bizResults.querySelectorAll('.biz-item').forEach(el => {
      el.addEventListener('click', () => {
        const place = data[+el.dataset.i];
        selectBizResult(parseFloat(place.lat), parseFloat(place.lon),
          place.display_name.split(',').slice(0,2).join(',').trim());
      });
    });
  } finally {
    searchBtn.textContent = 'Search';
    searchBtn.disabled = false;
  }
}

// Hide card on globe click
globe.onGlobeClick(() => { resultCard.style.display = 'none'; });

// ─── Directions ───────────────────────────────────────────────────────────────
const directionsPanel  = document.getElementById('directions-panel');
const directionsSummary = document.getElementById('directions-summary');
const directionsSteps  = document.getElementById('directions-steps');
let routePolyline = null;

document.getElementById('btn-directions').addEventListener('click', function() {
  const open = directionsPanel.style.display === 'flex';
  directionsPanel.style.display = open ? 'none' : 'flex';
  this.classList.toggle('active', !open);
});
document.getElementById('directions-close').addEventListener('click', () => {
  directionsPanel.style.display = 'none';
  document.getElementById('btn-directions').classList.remove('active');
});

function maneuverIcon(type, modifier) {
  if (type === 'arrive') return '🏁';
  if (type === 'depart') return '🟢';
  if (!modifier) return '⬆️';
  if (modifier.includes('left'))  return modifier.includes('sharp') ? '↰' : modifier.includes('slight') ? '↖️' : '⬅️';
  if (modifier.includes('right')) return modifier.includes('sharp') ? '↱' : modifier.includes('slight') ? '↗️' : '➡️';
  if (modifier === 'uturn') return '↩️';
  return '⬆️';
}

function formatDist(m) {
  return m >= 1000 ? (m/1609.34).toFixed(1) + ' mi' : Math.round(m) + ' m';
}
function formatTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h > 0 ? `${h} hr ${m} min` : `${m} min`;
}

async function geocodeDir(q) {
  const coords = parseCoords(q);
  if (coords) return coords;
  // Try Census first
  try {
    const url = `https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address=${encodeURIComponent(q)}&benchmark=2020&format=json`;
    const res = await fetch(url);
    const d = await res.json();
    const m = d?.result?.addressMatches;
    if (m?.length) return { lat: m[0].coordinates.y, lng: m[0].coordinates.x };
  } catch(_) {}
  // Fallback Nominatim
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const d = await res.json();
  if (!d.length) return null;
  return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
}

document.getElementById('get-directions-btn').addEventListener('click', async function() {
  const startQ = document.getElementById('dir-start').value.trim();
  const endQ   = document.getElementById('dir-end').value.trim();
  if (!startQ || !endQ) return;

  this.textContent = '…';
  this.disabled = true;
  directionsSteps.innerHTML = '';
  directionsSummary.style.display = 'none';

  try {
    const [from, to] = await Promise.all([geocodeDir(startQ), geocodeDir(endQ)]);
    if (!from || !to) {
      directionsSteps.innerHTML = '<div class="dir-step"><div class="dir-step-icon">⚠️</div><div>Could not find one of the locations. Try a more specific address.</div></div>';
      return;
    }

    // OSRM routing (free, no API key)
    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson&steps=true`;
    const res  = await fetch(osrmUrl);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes.length) {
      directionsSteps.innerHTML = '<div class="dir-step"><div class="dir-step-icon">⚠️</div><div>Could not find a route between these locations.</div></div>';
      return;
    }

    const route = data.routes[0];
    const coords = route.geometry.coordinates; // [lng, lat]

    // Draw route on Leaflet map
    initLeaflet();
    if (routePolyline) leafletMap.removeLayer(routePolyline);
    const latLngs = coords.map(c => [c[1], c[0]]);
    routePolyline = L.polyline(latLngs, { color: '#4af', weight: 5, opacity: 0.85 }).addTo(leafletMap);
    leafletMap.fitBounds(routePolyline.getBounds(), { padding: [20, 20] });
    mapPanel.style.display = 'flex';
    setTimeout(() => leafletMap.invalidateSize(), 120);

    // Fly globe between start and end
    const midLat = (from.lat + to.lat) / 2;
    const midLng = (from.lng + to.lng) / 2;
    globe.pointOfView({ lat: midLat, lng: midLng, altitude: 2 }, 1800);

    // Summary
    directionsSummary.innerHTML = `<strong>${formatTime(route.duration)}</strong> &nbsp;·&nbsp; <strong>${formatDist(route.distance)}</strong>`;
    directionsSummary.style.display = 'block';

    // Steps
    const steps = route.legs[0].steps;
    directionsSteps.innerHTML = steps.map(step => {
      const icon = maneuverIcon(step.maneuver.type, step.maneuver.modifier);
      const name = step.name || step.maneuver.type;
      return `<div class="dir-step">
        <div class="dir-step-icon">${icon}</div>
        <div>
          <div>${step.maneuver.type === 'arrive' ? 'Arrive at destination' : (step.maneuver.instruction || name)}</div>
          <div class="dir-step-dist">${formatDist(step.distance)}</div>
        </div>
      </div>`;
    }).join('');

  } catch(err) {
    directionsSteps.innerHTML = '<div class="dir-step"><div class="dir-step-icon">⚠️</div><div>Routing service unavailable. Check your connection.</div></div>';
  } finally {
    this.textContent = 'Get Directions';
    this.disabled = false;
  }
});

// ─── 2D Map Panel (Leaflet) ───────────────────────────────────────────────────
const mapPanel    = document.getElementById('map-panel');
const mapTitle    = document.getElementById('map-panel-title');
const mapCloseBtn = document.getElementById('map-close-btn');
const mapTabs     = document.querySelectorAll('.map-tab');

let leafletMap    = null;
let leafletMarker = null;

const tileLayers = {
  mapnik:    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  hot:       'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
  cyclemap:  'https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png',
};
let currentTile = null;

function initLeaflet() {
  if (leafletMap) return;
  leafletMap = L.map('map-frame', { zoomControl: true, attributionControl: false });
  currentTile = L.tileLayer(tileLayers.mapnik, { maxZoom: 19 }).addTo(leafletMap);
}

function showMap(lat, lng, name, zoom) {
  mapTitle.textContent = '📍 ' + name;
  mapPanel.style.display = 'flex';

  // Show panel first, then let Leaflet measure the container correctly
  setTimeout(() => {
    initLeaflet();
    leafletMap.invalidateSize(true);
    leafletMap.setView([lat, lng], zoom);

    if (leafletMarker) leafletMap.removeLayer(leafletMarker);
    leafletMarker = L.circleMarker([lat, lng], {
      radius: 9,
      fillColor: '#e63946',
      color: '#fff',
      weight: 3,
      fillOpacity: 1,
    }).addTo(leafletMap);
    leafletMarker.bindPopup(`<b>${name}</b>`).openPopup();
  }, 120);
}

mapCloseBtn.addEventListener('click', () => { mapPanel.style.display = 'none'; });

mapTabs.forEach(tab => {
  tab.addEventListener('click', function() {
    mapTabs.forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    if (leafletMap && currentTile) {
      leafletMap.removeLayer(currentTile);
      currentTile = L.tileLayer(tileLayers[this.dataset.layer], { maxZoom: 19 }).addTo(leafletMap);
    }
  });
});

document.getElementById('btn-borders').addEventListener('click', function() {
  showBorders = !showBorders;
  this.classList.toggle('active', showBorders);

});

  showHeatmap = !showHeatmap;

  applyHeatmap();
});

document.getElementById('btn-markers').addEventListener('click', function() {
  showMarkers = !showMarkers;
  this.classList.toggle('active', showMarkers);
  applyMarkers();
});
